version: "3.1"

intents:
  - greet
  - thanks
  - end_conversation
  - goodbye
  - fetch_all_products
  - fetch_products_with_filters
  - product_compare
  - shipping_info
  - faq
  - faq/returns
  - faq/shipping
  - faq/warranty
  - faq_link
  - return_policy_link
  - request_live_agent
  - restricted_request
  - out_of_scope
  - nlu_fallback
  - set_language

entities:
  - product_category
  - product_price
  - product_specs
  - product_brand
  - lang

slots:
  lang:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: lang

  product_category:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_category

  product_price:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_price

  product_specs:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_specs

  product_brand:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_brand

  handoff_active:
    type: bool
    influence_conversation: true
    initial_value: false
    mappings:
      - type: custom

responses:
  utter_greet:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "你好！今天有什么我可以帮你的吗？"
    - text: "Hello! How can I help you today?" # Default

  utter_thanks:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "不客气！还有其他我可以帮您的吗？"
    - text: "You're welcome! Anything else I can help with?"

  utter_end_conversation:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "好的，已为您处理完毕。如需更多帮助，随时告诉我。"
    - text: "Great, glad I could help. If you need anything else later, just ask."

  utter_goodbye:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "再见！祝您生活愉快！"
    - text: "Goodbye! Have a nice day!"

  utter_shipping_info:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "您可以在这里查看物流详情：[物流查询]({link})"
    - text: "You can find shipping & delivery details here: [Return Shipping Info]({link})"

  utter_default:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "抱歉，我没太听懂。您可以换个说法，或者选择下面的选项。"
    - text: "I'm not sure I got that. Could you rephrase or choose a quick option below?"
  
  # Form Prompts
  utter_ask_product_category:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "您想找哪类产品？（例如：键盘、显示器、耳机）"
    - text: "What category of products are you interested in?"

  utter_ask_product_price:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "您的预算或价格范围是多少？"
    - text: "What is your budget or price range?"

  utter_ask_product_specs:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "您对规格有什么具体要求吗？"
    - text: "Do you have any specific requirements or specifications in mind?"

  utter_faq_link:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "我可以帮您！请点击下方链接访问常见问题页面。\n[常见问题]({link})"
    - text: "I can help with that! Please click the link below to visit our dedicated FAQ page.\n[Frequently Asked Questions]({link})"

  utter_restricted_request:
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "我无法在这里处理个人订单或支付问题。请登录并联系在线客服。"
    - text: "I can't help with personal, order, or payment matters here. Please log in and contact support for assistance."

  utter_faq:
    - text: "I can help with general questions. What would you like to know?"
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "我可以回答一些常见问题。您想了解什么？"

  utter_faq/returns:
    - text: "You can read our returns policy here: [Returns & Refunds]({link})"
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "您可以在这里查看退货与退款政策：[退货与退款]({link})"

  utter_faq/shipping:
    - text: "You can read shipping and delivery details here: [Shipping & Returns]({link})"
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "您可以在这里查看配送与运输说明：[配送与退货]({link})"

  utter_faq/warranty:
    - text: "Warranty details are listed on our policy pages. You can start here: [FAQ]({link})"
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "保修详情在政策页面中可查看，可先从这里开始：[常见问题]({link})"

  utter_out_of_scope:
    - text: "I'm sorry, I'm built to help with store and product inquiries. I might not be able to help with that."
    - condition:
        - name: lang
          type: value
          value: "zh"
      text: "抱歉，我目前只能回答关于商店和产品的问题。"

forms:
  product_filter_form:
    required_slots:
      - product_category

actions:
  - action_fetch_all_products
  - action_fetch_products_with_filters
  - action_llm_compare
  - action_llm_fallback
  - action_faq_link
  - action_return_policy_link
  - action_shipping_info_link
  - action_handoff_to_agent
  - action_forward_to_agent
  - validate_product_filter_form
  - action_reset_handoff
