version: "3.1"

intents:
  - greet
  - goodbye
  - fetch_all_products
  - fetch_products_with_filters
  - shipping_info
  - order_status
  - faq_link
  - return_policy_link
  - request_live_agent
  - nlu_fallback
  - csat_rating

entities:
  - product_category
  - product_price
  - product_specs
  - product_brand
slots:
  product_category:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_category

  product_price:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_price

  product_specs:
    type: text
    influence_conversation: false
    mappings:
      # NLU extracts 'Wireless' or 'IPS' as product_specs
      - type: from_entity
        entity: product_specs
      # Allow the user to type in specs if the entity extraction fails
      # - type: from_text
      #   ignore_if_not_set: true

  product_brand:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_brand

  handoff_active:
    type: bool
    influence_conversation: true
    initial_value: false
    mappings:
      - type: custom

responses:
  utter_greet:
    - text: "Hello! How can I help you today?"
  utter_goodbye:
    - text: "Goodbye! Have a nice day!"
  utter_shipping_info:
    - text: "You can find shipping details here: https://example.com/shipping-returns (delivery times, costs, tracking)."
  utter_order_status:
    - text: "You can check your order status any time at https://example.com/order-status. Tell me your order number if you want me to look it up."
  utter_default:
    - text: "I'm not sure I got that. Could you rephrase or choose a quick option below?"
  utter_ask_product_category:
    - text: "What category of products are you interested in?"
  utter_ask_product_price:
    - text: "What is your budget or price range?"
  utter_ask_product_specs:
    - text: "Do you have any specific requirements or specifications in mind?"
  utter_faq_link:
    - text: "I can help with that! Please click the link below to visit our dedicated FAQ page.\n[Frequently Asked Questions]({link})"
  utter_return_policy_link:
    - text: "You can read about our return policy here: [Return Policy Link]({link})"

forms:
  product_filter_form:
    # Only the category is required for the initial search to prevent fetching ALL products.
    required_slots:
      - product_category
    # product_price, product_brand and product_specs are now OPTIONAL for form submission.

actions:
  - action_fetch_all_products
  - action_fetch_products_with_filters
  - action_faq_link
  - action_return_policy_link
  - action_handoff_to_agent
  - action_forward_to_agent
  - action_submit_csat
  - validate_product_filter_form
  - action_reset_handoff
