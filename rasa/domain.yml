version: "3.1"

intents:
  - greet
  - thanks
  - goodbye
  - fetch_all_products
  - fetch_products_with_filters
  - product_compare
  - shipping_info
  - faq
  - faq_link
  - return_policy_link
  - request_live_agent
  - restricted_request
  - out_of_scope
  - nlu_fallback

entities:
  - product_category
  - product_price
  - product_specs
  - product_brand
  - lang

slots:
  # Added to capture the detected language from your custom component
  lang:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: lang

  product_category:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_category

  product_price:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_price

  product_specs:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_specs

  product_brand:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_brand

  handoff_active:
    type: bool
    influence_conversation: true
    initial_value: false
    mappings:
      - type: custom

responses:
  utter_greet:
    - text: "Hello! How can I help you today?"
    - text: "你好！今天有什么我可以帮你的吗？"
  utter_thanks:
    - text: "You're welcome! Anything else I can help with?"
    - text: "不客气！还有其他我可以帮您的吗？"
  utter_goodbye:
    - text: "Goodbye! Have a nice day!"
    - text: "再见！祝您生活愉快！"
  utter_shipping_info:
    - text: "You can find shipping & delivery details here: [Return Shipping Info]({link})"
  utter_default:
    - text: "I'm not sure I got that. Could you rephrase or choose a quick option below?"
    - text: "抱歉，我没太听懂。您可以换个说法，或者选择下面的选项。"
  
  # Form Prompts (Localized)
  utter_ask_product_category:
    - text: "What category of products are you interested in?"
    - text: "您想找哪类产品？（例如：键盘、显示器、耳机）"
  utter_ask_product_price:
    - text: "What is your budget or price range?"
    - text: "您的预算或价格范围是多少？"
  utter_ask_product_specs:
    - text: "Do you have any specific requirements or specifications in mind?"
    - text: "您对规格有什么具体要求吗？"

  utter_faq_link:
    - text: "I can help with that! Please click the link below to visit our dedicated FAQ page.\n[Frequently Asked Questions]({link})"
  utter_return_policy_link:
    - text: "You can read about our return policy here: [Return Policy Link]({link})"
  utter_faq/returns:
    - text: "Our return window is 30 days. Items must be unused and in original packaging."
  utter_faq/shipping:
    - text: "Standard processing is 1–3 business days, with delivery timelines shown at checkout."
  utter_faq/warranty:
    - text: "Warranty coverage depends on the brand and product. Check the product page or contact support."
  utter_restricted_request:
    - text: "I can't help with personal, order, or payment matters here. Please log in and contact support for assistance."
  utter_out_of_scope:
    - text: "I'm here to help with product questions and store info. Try asking about products, shipping, or returns."

forms:
  product_filter_form:
    required_slots:
      - product_category

actions:
  - action_fetch_all_products
  - action_fetch_products_with_filters
  - action_llm_compare
  - action_llm_fallback
  - action_faq_link
  - action_return_policy_link
  - action_shipping_info_link
  - action_handoff_to_agent
  - action_forward_to_agent
  - validate_product_filter_form
  - action_reset_handoff