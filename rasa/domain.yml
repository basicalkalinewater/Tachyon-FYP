version: "3.1"

intents:
  - greet
  - goodbye
  - fetch_all_products
  - fetch_products_with_filters

entities:
  - product_category
  - product_price
  - product_specs

slots:
  product_category:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_category

  product_price:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: product_price

  product_specs:
    type: text
    influence_conversation: false
    mappings:
      # NLU extracts 'Wireless' or 'IPS' as product_specs
      - type: from_entity
        entity: product_specs
      # Allow the user to type in specs if the entity extraction fails
      # - type: from_text
      #   ignore_if_not_set: true

responses:
  utter_greet:
    - text: "Hello! How can I help you today?"
  utter_goodbye:
    - text: "Goodbye! Have a nice day!"
  utter_ask_product_category:
    - text: "What category of products are you interested in?"
  utter_ask_product_price:
    - text: "What is your budget or price range?"
  utter_ask_product_specs:
    - text: "Do you have any specific requirements or specifications in mind?"

forms:
  product_filter_form:
    # Only the category is required for the initial search to prevent fetching ALL products.
    required_slots:
      - product_category
    # product_price and product_specs are now OPTIONAL for form submission.

actions:
  - action_fetch_all_products
  - action_fetch_products_with_filters