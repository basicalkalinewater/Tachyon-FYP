version: "3.1"

rules:
  - rule: Greet user
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Thank you
    steps:
      - intent: thanks
      - action: utter_thanks

  - rule: End conversation
    steps:
      - intent: end_conversation
      - action: utter_end_conversation

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  # --- PRODUCT SEARCH LOGIC ---
  # Combined Rule: This handles BOTH full sentences and partial ones.
  # If entities are missing, the Action/Form will handle the follow-up.
  - rule: Handle product search with filters
    steps:
      - intent: fetch_products_with_filters
      - action: action_fetch_products_with_filters

  - rule: Fetch all products without filters
    steps:
      - intent: fetch_all_products
      - action: action_fetch_all_products

  # --- FAQ & INFO ---
  - rule: Answer FAQ
    steps:
      - intent: faq
      - action: utter_faq

  - rule: Answer FAQ returns
    steps:
      - intent: faq_returns
      - action: utter_faq_returns

  - rule: Answer FAQ shipping
    steps:
      - intent: faq_shipping
      - action: utter_faq_shipping

  - rule: Answer FAQ warranty
    steps:
      - intent: faq_warranty
      - action: utter_faq_warranty

  - rule: Provide FAQ link
    steps:
      - intent: faq_link
      - action: action_faq_link

  - rule: Provide return policy link
    steps:
      - intent: return_policy_link
      - action: action_return_policy_link

  - rule: Provide shipping info
    steps:
      - intent: shipping_info
      - action: action_shipping_info_link

  # --- AGENT HANDOFF ---
  - rule: Handoff to live agent
    steps:
      - intent: request_live_agent
      - action: action_handoff_to_agent

  - rule: Forward messages during handoff
    condition:
      - slot_was_set:
          - handoff_active: true
    steps:
      - intent: nlu_fallback
      - action: action_forward_to_agent
      - action: action_listen

  - rule: Reset handoff when user says goodbye
    condition:
      - slot_was_set:
          - handoff_active: true
    steps:
      - intent: goodbye
      - action: action_reset_handoff
      - action: utter_goodbye
      - action: action_listen

  - rule: Reset handoff when user ends conversation
    condition:
      - slot_was_set:
          - handoff_active: true
    steps:
      - intent: end_conversation
      - action: action_reset_handoff
      - action: utter_end_conversation
      - action: action_listen

  # --- ADVANCED & FALLBACK ---
  - rule: Product comparison via LLM
    steps:
      - intent: product_compare
      - action: action_llm_compare

  - rule: Restricted request
    steps:
      - intent: restricted_request
      - action: utter_restricted_request

  - rule: Out of scope
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope

  - rule: Fallback
    steps:
      - intent: nlu_fallback
      - action: action_llm_fallback
      - action: action_listen
