version: "3.1"

rules:
  - rule: Fetch all products without filters
    steps:
      - intent: fetch_all_products
      - action: action_fetch_all_products

  - rule: Activate product filter form
    steps:
      - intent: fetch_products_with_filters
      - action: product_filter_form
      - active_loop: product_filter_form

  - rule: Submit product filter form
    steps:
      - action: product_filter_form
      - active_loop: null
      - action: action_fetch_products_with_filters

  - rule: Provide FAQ link
    steps:
      - intent: faq_link
      - action: action_faq_link

  - rule: Answer FAQ
    steps:
      - intent: faq
      - action: utter_faq

  - rule: Provide return policy link
    steps:
      - intent: return_policy_link
      - action: action_return_policy_link

  - rule: Handoff to live agent
    steps:
      - intent: request_live_agent
      - action: action_handoff_to_agent

  - rule: Product comparison via LLM
    steps:
      - intent: product_compare
      - action: action_llm_compare

  - rule: Forward messages during handoff
    condition:
      - slot_was_set:
          - handoff_active: true
    steps:
      - intent: nlu_fallback
      - action: action_forward_to_agent
      - action: action_listen

  - rule: Greet user
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Thank you
    steps:
      - intent: thanks
      - action: utter_thanks

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Provide shipping info
    steps:
      - intent: shipping_info
      - action: action_shipping_info_link

  - rule: Restricted request
    steps:
      - intent: restricted_request
      - action: utter_restricted_request
  - rule: Out of scope
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope

  - rule: Fallback
    steps:
      - intent: nlu_fallback
      - action: action_llm_fallback
      - action: action_listen

  - rule: Reset handoff when user says goodbye
    condition:
      - slot_was_set:
          - handoff_active: true
    steps:
      - intent: goodbye
      - action: action_reset_handoff
      - action: utter_goodbye
      - action: action_listen
