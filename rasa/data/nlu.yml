version: "3.1"

nlu:
  - intent: greet
    examples: |
      - hi
      - hello
      - hey

  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - see you

  - intent: fetch_all_products
    examples: |
      - Show me all products
      - I want to see all available products
      - List all products
      - products
      - what products do you have
      - what are you selling

  - intent: fetch_products_with_filters
    examples: |
      - Show me [monitor](product_category) under [500](product_price)
      - I want a [keyboard](product_category) with [Wireless](product_specs) connection
      - Do you have [ssd](product_category) in the [100-300](product_price) range?
      - Find [mouse](product_category) below [250](product_price)
      - Show me a [keyboard](product_category) under [150](product_price)
      - I need a [monitor](product_category) with [IPS](product_specs) panel type
