version: "3.1"

nlu:
  - intent: greet
    examples: |
      - hi
      - hello
      - hey
      - good morning
      - good evening

  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - see you

  - intent: affirm
    examples: |
      - yes
      - yup
      - sure
      - correct

  - intent: deny
    examples: |
      - no
      - nope
      - not really

  - intent: faq_shipping
    examples: |
      - how long is shipping
      - shipping time
      - delivery time
      - shipping options

  - intent: faq_returns
    examples: |
      - what is your return policy
      - can I return
      - how do I return
      - refunds

  - intent: faq_order_status
    examples: |
      - where is my order?
      - order status
      - track my order

  - intent: products
    examples: |
      - what products do you have
      - show products
      - list items
      - product
      - products
      - list products
  
  - intent: fetch_specific_product
    examples: |
      - Show me [ASUS ROG Swift PG27AQN](product_title)
      - I want [Razer Viper V3 Pro](product_title)
      - Do you have [LG UltraGear 27GN950-B](product_title)?
      - Find [Dell AW2723DF](product_title)
