language: "en"  # primary locale is arbitrary; model is multilingual

pipeline:
  - name: custom_components.language_detector.LanguageDetector  # sets message.lang using fastText
  - name: WhitespaceTokenizer
    intent_tokenization_flag: True
    use_word_boundaries: False          # keeps CJK characters intact
  - name: RegexFeaturizer
  - name: LexicalSyntacticFeaturizer
  - name: CountVectorsFeaturizer        # word n‑grams
  - name: CountVectorsFeaturizer        # char n‑grams help Chinese
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4
  - name: LanguageModelFeaturizer       # multilingual sentence embeddings (LaBSE)
    model_name: "bert"
    model_weights: "rasa/LaBSE"
  - name: DIETClassifier
    epochs: 100
  - name: EntitySynonymMapper
  - name: ResponseSelector
    epochs: 80

policies:
  - name: RulePolicy
  - name: MemoizationPolicy
  - name: TEDPolicy
    epochs: 40
